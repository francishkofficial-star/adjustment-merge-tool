<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopID 物流單號查詢工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
            transition: all 0.3s;
        }
        .upload-section.dragover {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        .upload-section.has-file {
            border-color: #4CAF50;
            background: #e8f5e9;
            border-style: solid;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .upload-hint {
            color: #999;
            font-size: 13px;
        }
        #fileInput {
            display: none;
        }
        .file-name {
            color: #4CAF50;
            font-weight: 600;
            margin-top: 8px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .toolbar-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        button {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover {
            background: #1976D2;
        }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover {
            background: #d32f2f;
        }
        .btn-copy {
            background: #FF9800;
            color: white;
        }
        .btn-copy:hover {
            background: #F57C00;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }
        .main-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .main-table th, .main-table td {
            border: 1px solid #e0e0e0;
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }
        .main-table th {
            background: #4CAF50;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .main-table th:first-child {
            width: 140px;
        }
        .main-table th:last-child {
            width: 80px;
            text-align: center;
        }
        .main-table tr:nth-child(even) {
            background: #fafafa;
        }
        .main-table tr:hover {
            background: #e8f5e9;
        }
        .main-table td:first-child {
            font-weight: 500;
            color: #333;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .tracking-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tracking-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #e3f2fd;
            color: #1565C0;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            border: 1px solid #bbdefb;
        }
        .tracking-tag .copy-icon {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: 12px;
        }
        .tracking-tag .copy-icon:hover {
            opacity: 1;
        }
        .empty-cell {
            color: #bbb;
            font-style: italic;
        }
        .action-cell {
            text-align: center;
        }
        .copy-row-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            background: #2196F3;
            color: white;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .main-table tr:hover .copy-row-btn {
            opacity: 1;
        }
        .copy-row-btn:hover {
            background: #1976D2;
        }
        .copy-row-btn.copied {
            background: #4CAF50;
            opacity: 1;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #4CAF50;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .input-section {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .id-input {
            width: 100%;
            min-height: 80px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: vertical;
        }
        .id-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .copy-row-btn {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ShopID 物流單號查詢工具</h1>
        <p class="subtitle">上傳已攬收表格 → 粘貼 ShopID → 一鍵查詢順豐運單號</p>

        <div class="upload-section" id="dropZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">點擊或拖拽上傳「已攬收」Excel 文件</div>
            <div class="upload-hint">支持 .xlsx 格式，收件方公司列將作為 ShopID</div>
            <div class="file-name" id="fileName"></div>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
        </div>

        <div class="input-section">
            <div class="input-label">📋 粘貼 ShopID（每行一個，支持從 Excel 直接粘貼）</div>
            <textarea class="id-input" id="inputArea" placeholder="在此粘貼 ShopID，每行一個...
例如：
721524339
452343
580794"></textarea>
        </div>

        <div class="toolbar">
            <div class="toolbar-left">
                <span class="panel-title">📤 查詢結果</span>
            </div>
            <div class="toolbar-right">
                <button class="btn-primary" onclick="lookup()">🔍 查詢單號</button>
                <button class="btn-copy" onclick="copyAllTracking()">📋 複製全部單號</button>
                <button class="btn-danger" onclick="clearAll()">🗑️ 清空</button>
            </div>
        </div>

        <table class="main-table" id="resultsTable">
            <thead>
                <tr>
                    <th>ShopID</th>
                    <th>順豐運單號</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                <tr>
                    <td colspan="3" style="text-align:center;color:#999;padding:40px;">
                        請上傳文件並輸入 ShopID 後點擊查詢
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="stats" id="stats" style="display:none;">
            <div class="stat-item">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">總計查詢</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statFound">0</div>
                <div class="stat-label">匹配成功</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statNotFound">0</div>
                <div class="stat-label">未找到</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let mapping = {};
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const inputArea = document.getElementById('inputArea');
        const toast = document.getElementById('toast');

        // 文件上传
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.xlsx') && !file.name.endsWith('.xls')) {
                showToast('請上傳 Excel 文件（.xlsx 或 .xls）');
                return;
            }
            
            fileName.textContent = '已選擇：' + file.name;
            dropZone.classList.add('has-file');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    if (rows.length < 2) {
                        showToast('文件為空或格式不正確');
                        return;
                    }
                    
                    const header = rows[0];
                    let companyIdx = -1;
                    let trackingIdx = -1;
                    
                    header.forEach((col, idx) => {
                        if (col && col.toString().includes('收件方公司')) companyIdx = idx;
                        if (col && col.toString().includes('順豐運單號')) trackingIdx = idx;
                    });
                    
                    if (companyIdx === -1 || trackingIdx === -1) {
                        showToast('未找到「收件方公司」或「順豐運單號」列，請檢查文件格式');
                        return;
                    }
                    
                    mapping = {};
                    let count = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row[companyIdx] && row[trackingIdx]) {
                            const shopId = row[companyIdx].toString().trim();
                            const tracking = row[trackingIdx].toString().trim();
                            if (!mapping[shopId]) mapping[shopId] = [];
                            if (!mapping[shopId].includes(tracking)) {
                                mapping[shopId].push(tracking);
                                count++;
                            }
                        }
                    }
                    
                    showToast(`成功載入 ${Object.keys(mapping).length} 個 ShopID 映射關係（${count} 條單號）`);
                } catch (err) {
                    showToast('解析文件失敗：' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function lookup() {
            if (Object.keys(mapping).length === 0) {
                showToast('請先上傳已攬收 Excel 文件');
                return;
            }
            
            const lines = inputArea.value.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length === 0) {
                showToast('請輸入 ShopID');
                return;
            }
            
            let found = 0;
            let notFound = 0;
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            
            lines.forEach(shopId => {
                const trackings = mapping[shopId];
                const tr = document.createElement('tr');
                
                if (trackings && trackings.length > 0) {
                    const tagsHtml = trackings.map(t => 
                        `<span class="tracking-tag">${escapeHtml(t)}<span class="copy-icon" onclick="copyText('${escapeHtml(t).replace(/'/g, "\\'")}', this)" title="複製">📋</span></span>`
                    ).join('');
                    
                    tr.innerHTML = `
                        <td>${escapeHtml(shopId)}</td>
                        <td><div class="tracking-list">${tagsHtml}</div></td>
                        <td class="action-cell"><button class="copy-row-btn" onclick="copyRowTracking(this, '${escapeHtml(trackings.join('、')).replace(/'/g, "\\'")}')">複製</button></td>
                    `;
                    found++;
                } else {
                    tr.innerHTML = `
                        <td>${escapeHtml(shopId)}</td>
                        <td><span class="empty-cell">（未找到）</span></td>
                        <td class="action-cell">-</td>
                    `;
                    notFound++;
                }
                
                tbody.appendChild(tr);
            });
            
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('statTotal').textContent = lines.length;
            document.getElementById('statFound').textContent = found;
            document.getElementById('statNotFound').textContent = notFound;
            
            showToast(`查詢完成：${found} 個匹配，${notFound} 個未找到`);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyText(text, iconEl) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已複製：' + text);
                iconEl.textContent = '✓';
                setTimeout(() => iconEl.textContent = '📋', 1000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已複製：' + text);
            });
        }

        function copyRowTracking(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '已複製';
                btn.classList.add('copied');
                showToast('已複製該行所有單號');
                setTimeout(() => {
                    btn.textContent = '複製';
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已複製該行所有單號');
            });
        }

        function copyAllTracking() {
            const rows = document.querySelectorAll('#resultsBody tr');
            const allTracking = [];
            
            rows.forEach(row => {
                const tags = row.querySelectorAll('.tracking-tag');
                tags.forEach(tag => {
                    const text = tag.childNodes[0].textContent.trim();
                    if (text) allTracking.push(text);
                });
            });
            
            if (allTracking.length === 0) {
                showToast('沒有單號可複製');
                return;
            }
            
            const text = allTracking.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                showToast(`已複製 ${allTracking.length} 條單號`);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(`已複製 ${allTracking.length} 條單號`);
            });
        }

        function clearAll() {
            inputArea.value = '';
            document.getElementById('resultsBody').innerHTML = `
                <tr>
                    <td colspan="3" style="text-align:center;color:#999;padding:40px;">
                        請上傳文件並輸入 ShopID 後點擊查詢
                    </td>
                </tr>
            `;
            document.getElementById('stats').style.display = 'none';
            showToast('已清空');
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 支持 Ctrl+Enter 快速查询
        inputArea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') lookup();
        });
    </script>
</body>
</html>
